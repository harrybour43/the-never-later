<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2c1e14" />
    <title>The Never-Later (Desatrasador)</title>
    
    <link rel="manifest" href="manifest.json" />

    <link rel="stylesheet" href="style.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>

    <script async defer src="https://apis.google.com/js/api.js" onload="gapiLoaded()"></script>
    <script async defer src="https://accounts.google.com/gsi/client" onload="gisLoaded()"></script>

    <script src="app.js" defer></script>
  </head>
  <body>
    <div id="app-container" data-engrenagem="cwwIzO3ND6GwU">
      <h1>Desatrasador</h1>
      <div class="tagline">
        Artefato de Precisão Temporal <br />
        <small>para Procrastinadores Conscientes</small>
      </div>

      <div style="margin-bottom: 25px;">
        <button 
          type="button" 
          onclick="conectarAgenda()" 
          style="width: 100%; padding: 10px; background: transparent; border: 1px dashed var(--bronze); color: var(--gold); font-family: 'Special Elite', monospace; cursor: pointer; border-radius: 4px; transition: 0.2s;"
          onmouseover="this.style.background='rgba(139, 90, 43, 0.2)'"
          onmouseout="this.style.background='transparent'"
        >
          [ Sincronizar Pergaminho ] <br> 
          <small style="font-size: 0.7rem; color: var(--copper);">Acessar Agenda Digital</small>
        </button>
      </div>

      <div class="input-group">
        <label>DESTINO</label>
        <input type="text" id="destino" placeholder="Ex: CCSP Vergueiro" value="Centro Cultural Vergueiro" />
        
        <button 
          type="button" 
          onclick="calcularTrajetoOpenSource()" 
          style="width: 100%; margin-top: 8px; padding: 10px; background: rgba(0,0,0,0.4); border: 1px solid var(--bronze); color: var(--copper); font-family: 'Special Elite', monospace; cursor: pointer; transition: 0.2s;"
          onmouseover="this.style.color='var(--gold)'; this.style.borderColor='var(--gold)';"
          onmouseout="this.style.color='var(--copper)'; this.style.borderColor='var(--bronze)';"
        >
          [ 🧭 Triangular Rota via GPS ]
        </button>
      </div>

      <div class="input-group">
        <label>HORÁRIO DO COMPROMISSO</label>
        <input type="time" id="hora-comp" value="10:00" />
      </div>

      <div class="input-group">
        <label>TRAJETO ESTIMADO (MINUTOS)</label>
        <input type="number" id="trajeto" value="30" />
      </div>

      <div class="toggle-group">
        <label style="color: var(--gold); margin: 0">ACOMPANHADO?</label>
        <input type="checkbox" id="com-anna" style="accent-color: var(--bronze); transform: scale(1.5)" />
      </div>

      <button class="main-btn" onclick="armarDispositivo()">
        Ativar Mecanismo
      </button>

      <div id="status-board">
        <p id="st-arrumar"></p>
        <p id="st-sair"></p>
      </div>
    </div>

    <div id="alarm-overlay">
      <div id="alarm-cta" class="cta-text"></div>
      <div 
        id="alarm-clock" 
        style="font-size: 2.5rem; margin-bottom: 40px; font-family: 'Special Elite'; color: var(--parchment); border: 2px solid var(--iron); padding: 10px 20px;"
      ></div>
      <div class="context-box">
        <div id="alarm-info-dest" style="font-size: 1.5rem; color: var(--parchment)"></div>
      </div>
      <button class="dismiss-btn" onclick="encerrarAlarme()">SILENCIAR MÁQUINA</button>
    </div>
  </body>
</html>
